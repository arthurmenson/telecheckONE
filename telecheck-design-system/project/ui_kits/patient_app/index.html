<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<title>Telecheck · Patient app UI kit</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="patient.css"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="screens.jsx"></script>
<script type="text/babel">
  const { useState } = React;
  function Frame({ label, children }) {
    return (
      <div>
        <IOSDevice width={402} height={844}>{children}</IOSDevice>
        <div className="screen-label">{label}</div>
      </div>
    );
  }
  function App() {
    const [screen, setScreen] = useState('home');
    const nav = (s) => setScreen(s);
    return (
      <div className="stage">
        <div style={{textAlign:'center'}}>
          <div className="kit-title">Patient app — Telecheck</div>
          <div className="kit-sub">Mobile-first. One decision per screen. Emergency paths outrank chrome.</div>
        </div>
        <div className="screens">
          <Frame label="Home"><PAHome onNav={nav}/></Frame>
          <Frame label="Refill flow"><PARefill onNav={nav}/></Frame>
          <Frame label="Async consult intake"><PAConsult onNav={nav}/></Frame>
          <Frame label="RPM weekly check-in"><PARPM onNav={nav}/></Frame>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
