<!doctype html><html><head><meta charset="utf-8"><title>Brand colors</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css">
<style>
.sw { display: flex; flex-direction: column; gap: 6px; }
.chip { height: 72px; border-radius: 10px; border: 1px solid rgba(0,0,0,0.06); }
.chip-label { display: flex; justify-content: space-between; align-items: baseline; }
.name { font-size: 13px; font-weight: 600; color: var(--fg-1); }
.hex { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); }
.desc { font-size: 11px; color: var(--fg-3); line-height: 1.4; }
.grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
</style></head>
<body><div class="card"><div class="grid">
  <div class="sw"><div class="chip" style="background:#0B7A6B"></div><div class="chip-label"><span class="name">Teal 500</span><span class="hex">#0B7A6B</span></div><div class="desc">Primary — CTAs, active state, clinician-authored annotations, logo.</div></div>
  <div class="sw"><div class="chip" style="background:#C88A2B"></div><div class="chip-label"><span class="name">Gold 400</span><span class="hex">#C88A2B</span></div><div class="desc">Secondary — Kente-inspired, highlights and acquisition accents. Used sparingly.</div></div>
  <div class="sw"><div class="chip" style="background:#6E5BD6"></div><div class="chip-label"><span class="name">Iris 500</span><span class="hex">#6E5BD6</span></div><div class="desc">AI only. Reserved for AI-authored content per §12. Never on human output.</div></div>
</div></div></body></html>
