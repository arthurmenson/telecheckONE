<!doctype html><html><head><meta charset="utf-8"><title>Cards</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css">
<style>
body { background: var(--n-50); }
.card { background: var(--n-50); border: 0; padding: 24px; }
.grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
.tc { padding: 14px; border-radius: 12px; background: #fff; }
.flat { border: 1px solid var(--border-subtle); }
.lift { box-shadow: var(--e-1); }
.focus { box-shadow: var(--e-2); border: 1px solid color-mix(in oklab, var(--primary) 20%, transparent); }
.tag { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-3); margin-bottom: 8px; }
.title { font-size: 15px; font-weight: 600; color: var(--fg-1); margin-bottom: 4px; }
.meta { font-size: 12px; color: var(--fg-3); }
.lift .tag, .focus .tag { color: var(--primary); }
</style></head>
<body><div class="card"><div class="grid">
  <div class="tc flat"><div class="tag">Flat · list item</div><div class="title">Vitamin D 1000 IU</div><div class="meta">OTC · taken daily</div></div>
  <div class="tc lift"><div class="tag">Lifted · standalone</div><div class="title">Metformin 500 mg</div><div class="meta">Next refill 24 April</div></div>
  <div class="tc focus"><div class="tag">Focus · next action</div><div class="title">Review 3 signals</div><div class="meta">Before approving Ama's refill</div></div>
</div></div></body></html>
