<!doctype html><html><head><meta charset="utf-8"><title>Spacing scale</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css">
<style>
.row { display: grid; grid-template-columns: 40px 60px 1fr; gap: 16px; align-items: center; padding: 6px 0; }
.name { font-size: 12px; font-weight: 600; color: var(--fg-1); }
.val { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); }
.bar { height: 14px; background: var(--teal-500); border-radius: 3px; }
.note { font-size: 11px; color: var(--fg-3); margin-top: 10px; }
</style></head>
<body><div class="card">
<div class="row"><div class="name">sp-1</div><div class="val">4 px</div><div class="bar" style="width:4px"></div></div>
<div class="row"><div class="name">sp-2</div><div class="val">8 px</div><div class="bar" style="width:8px"></div></div>
<div class="row"><div class="name">sp-3</div><div class="val">12 px</div><div class="bar" style="width:12px"></div></div>
<div class="row"><div class="name">sp-4</div><div class="val">16 px</div><div class="bar" style="width:16px"></div></div>
<div class="row"><div class="name">sp-5</div><div class="val">20 px</div><div class="bar" style="width:20px"></div></div>
<div class="row"><div class="name">sp-6</div><div class="val">24 px</div><div class="bar" style="width:24px"></div></div>
<div class="row"><div class="name">sp-8</div><div class="val">32 px</div><div class="bar" style="width:32px"></div></div>
<div class="row"><div class="name">sp-10</div><div class="val">40 px</div><div class="bar" style="width:40px"></div></div>
<div class="row"><div class="name">sp-12</div><div class="val">48 px</div><div class="bar" style="width:48px"></div></div>
<div class="row"><div class="name">sp-16</div><div class="val">64 px</div><div class="bar" style="width:64px"></div></div>
<div class="row"><div class="name">sp-24</div><div class="val">96 px</div><div class="bar" style="width:96px"></div></div>
<div class="note">4-pt base. No half-values, no 10 px.</div>
</div></body></html>
