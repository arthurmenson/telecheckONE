<!doctype html><html><head><meta charset="utf-8"><title>Buttons</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css">
<style>
.row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; padding: 8px 0; }
.label { font-size: 11px; color: var(--fg-3); width: 88px; font-weight:500; letter-spacing:0.04em; text-transform:uppercase; }
.btn { font-family: var(--font-sans); font-weight: 600; font-size: 14px; padding: 10px 18px; border-radius: 8px; border: 0; cursor: pointer; display:inline-flex; align-items:center; gap:8px; }
.btn-primary { background: var(--primary); color: var(--fg-on-primary); box-shadow: var(--e-inner-top); }
.btn-primary-hover { background: var(--teal-600); color: #fff; box-shadow: var(--e-inner-top); }
.btn-primary-press { background: var(--teal-700); color: #fff; transform: scale(0.98); }
.btn-primary-disabled { background: var(--primary); color: #fff; opacity: 0.4; }
.btn-secondary { background: var(--surface-1); color: var(--fg-1); border: 1px solid var(--border-strong); }
.btn-ghost { background: transparent; color: var(--primary); padding: 10px 12px; }
.btn-danger { background: var(--danger); color: #fff; }
.btn-sm { font-size: 13px; padding: 7px 12px; border-radius: 6px; }
.btn-lg { font-size: 15px; padding: 14px 22px; border-radius: 10px; }
</style></head>
<body><div class="card">
<div class="row"><div class="label">Primary</div><button class="btn btn-primary">Request refill</button><button class="btn btn-primary-hover">Hover</button><button class="btn btn-primary-press">Pressed</button><button class="btn btn-primary-disabled">Disabled</button></div>
<div class="row"><div class="label">Secondary</div><button class="btn btn-secondary">Cancel</button><button class="btn btn-ghost">Learn more</button><button class="btn btn-danger">Block prescription</button></div>
<div class="row"><div class="label">Sizes</div><button class="btn btn-primary btn-sm">Small</button><button class="btn btn-primary">Default</button><button class="btn btn-primary btn-lg">Large · mobile CTA</button></div>
</div></body></html>
