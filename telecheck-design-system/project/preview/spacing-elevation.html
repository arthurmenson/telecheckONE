<!doctype html><html><head><meta charset="utf-8"><title>Elevation</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css">
<style>
body { background: var(--n-50); }
.card { background: var(--n-50); border: 0; }
.grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; padding: 12px 0 20px; }
.item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
.box { width: 100%; height: 72px; background: #fff; border-radius: 12px; }
.name { font-size: 12px; font-weight: 600; color: var(--fg-1); }
.val { font-family: var(--font-mono); font-size: 9.5px; color: var(--fg-3); text-align: center; line-height: 1.3; }
.use { font-size: 10px; color: var(--fg-3); text-align: center; }
</style></head>
<body><div class="card"><div class="grid">
  <div class="item"><div class="box" style="box-shadow:var(--e-0); border:1px solid var(--border-subtle)"></div><div class="name">E0</div><div class="use">borders only</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--e-1)"></div><div class="name">E1</div><div class="use">resting cards</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--e-2)"></div><div class="name">E2</div><div class="use">hover / lifted</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--e-3)"></div><div class="name">E3</div><div class="use">modals / sheets</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--e-4)"></div><div class="name">E4</div><div class="use">emergency / takeover</div></div>
</div></div></body></html>
