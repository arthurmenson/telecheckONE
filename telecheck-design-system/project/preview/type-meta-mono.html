<!doctype html><html><head><meta charset="utf-8"><title>Type — meta & mono</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css">
<style>
.row { display: grid; grid-template-columns: 96px 1fr; gap: 20px; align-items: baseline; padding: 10px 0; border-bottom: 1px solid var(--border-subtle); }
.row:last-child { border-bottom: 0; }
.meta { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); line-height: 1.4; }
</style></head>
<body><div class="card">
  <div class="row"><div class="meta">Meta<br/>12 · 500</div><div class="t-meta">Audited · 14 Apr 2026, 09:42 GMT</div></div>
  <div class="row"><div class="meta">Caps<br/>12 · 600 · tracked</div><div class="t-caps">Telecheck AI · interaction signal</div></div>
  <div class="row"><div class="meta">Mono<br/>13 · 400</div><div class="t-mono">rx_01HX2TA7QF3Z9K · eGFR 52 mL/min/1.73m² · K+ 4.1</div></div>
  <div class="row"><div class="meta">Family<br/>—</div><div style="font-family: var(--font-mono); font-size: 14px;">Manrope · Source Serif 4 · JetBrains Mono</div></div>
</div></body></html>
