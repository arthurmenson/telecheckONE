<!doctype html><html><head><meta charset="utf-8"><title>Logo</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css">
<style>
.cols { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; align-items: stretch; }
.box { background: #fff; border: 1px solid var(--border-subtle); border-radius: 12px; padding: 24px; display: flex; align-items: center; justify-content: center; min-height: 120px; }
.box-dark { background: var(--n-900); }
.box-teal { background: var(--teal-500); }
.lbl { font-size: 11px; color: var(--fg-3); text-align: center; margin-top: 6px; letter-spacing: 0.04em; text-transform: uppercase; font-weight: 500; }
.item { display: flex; flex-direction: column; }
.placeholder { margin-top: 14px; padding: 10px 12px; background: var(--warning-50); color: var(--warning-700); font-size: 12px; border-radius: 6px; border: 1px dashed var(--warning); }
</style></head>
<body><div class="card">
<div class="cols">
  <div class="item"><div class="box"><img src="../assets/logo/telecheck-wordmark.svg" height="40" alt="Telecheck"/></div><div class="lbl">Wordmark · on light</div></div>
  <div class="item"><div class="box"><img src="../assets/logo/telecheck-mark.svg" height="56" alt="Telecheck mark"/></div><div class="lbl">Mark only</div></div>
</div>
<div class="placeholder">⚠ Placeholder logo. Replace with the real brand files when available.</div>
</div></body></html>
