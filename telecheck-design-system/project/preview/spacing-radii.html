<!doctype html><html><head><meta charset="utf-8"><title>Radii</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css">
<style>
.grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; }
.item { display: flex; flex-direction: column; align-items: center; gap: 6px; }
.sq { width: 88px; height: 64px; background: var(--teal-50); border: 1px solid var(--teal-200); }
.name { font-size: 12px; font-weight: 600; color: var(--fg-1); }
.val { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); }
.use { font-size: 10px; color: var(--fg-3); text-align: center; line-height: 1.3; }
</style></head>
<body><div class="card"><div class="grid">
  <div class="item"><div class="sq" style="border-radius:4px"></div><div class="name">xs</div><div class="val">4 px</div><div class="use">inputs<br/>chips</div></div>
  <div class="item"><div class="sq" style="border-radius:8px"></div><div class="name">sm</div><div class="val">8 px</div><div class="use">buttons<br/>small cards</div></div>
  <div class="item"><div class="sq" style="border-radius:12px"></div><div class="name">md</div><div class="val">12 px</div><div class="use">content cards<br/>modals</div></div>
  <div class="item"><div class="sq" style="border-radius:20px"></div><div class="name">lg</div><div class="val">20 px</div><div class="use">mobile sheets</div></div>
  <div class="item"><div class="sq" style="border-radius:9999px"></div><div class="name">full</div><div class="val">∞</div><div class="use">avatars<br/>status dots<br/>AI badges</div></div>
</div></div></body></html>
