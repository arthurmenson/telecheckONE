<!doctype html><html><head><meta charset="utf-8"><title>Neutrals</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css">
<style>
.ramp { display: grid; grid-template-columns: repeat(11, 1fr); gap: 4px; }
.step { display: flex; flex-direction: column; gap: 4px; }
.chip { height: 58px; border-radius: 6px; border: 1px solid rgba(0,0,0,0.06); }
.step-name { font-size: 10px; font-weight: 600; color: var(--fg-2); text-align: center; }
.step-hex { font-family: var(--font-mono); font-size: 9px; color: var(--fg-3); text-align: center; }
.intro { font-size: 12px; color: var(--fg-3); margin-bottom: 14px; line-height: 1.5; }
</style></head>
<body><div class="card">
<div class="intro">Warm neutrals — tinted slightly toward green/teal, not blue. Carry ~85% of the UI.</div>
<div class="ramp">
  <div class="step"><div class="chip" style="background:#ffffff;border-color:#eceeec"></div><div class="step-name">0</div><div class="step-hex">FFFFFF</div></div>
  <div class="step"><div class="chip" style="background:#fbfcfb"></div><div class="step-name">25</div><div class="step-hex">FBFCFB</div></div>
  <div class="step"><div class="chip" style="background:#f5f7f6"></div><div class="step-name">50</div><div class="step-hex">F5F7F6</div></div>
  <div class="step"><div class="chip" style="background:#eceeec"></div><div class="step-name">100</div><div class="step-hex">ECEEEC</div></div>
  <div class="step"><div class="chip" style="background:#dde2e0"></div><div class="step-name">200</div><div class="step-hex">DDE2E0</div></div>
  <div class="step"><div class="chip" style="background:#c6cdc9"></div><div class="step-name">300</div><div class="step-hex">C6CDC9</div></div>
  <div class="step"><div class="chip" style="background:#9aa5a0"></div><div class="step-name">400</div><div class="step-hex">9AA5A0</div></div>
  <div class="step"><div class="chip" style="background:#6f7a75"></div><div class="step-name">500</div><div class="step-hex">6F7A75</div></div>
  <div class="step"><div class="chip" style="background:#525b57"></div><div class="step-name">600</div><div class="step-hex">525B57</div></div>
  <div class="step"><div class="chip" style="background:#3a413e"></div><div class="step-name">700</div><div class="step-hex">3A413E</div></div>
  <div class="step"><div class="chip" style="background:#131817"></div><div class="step-name">900</div><div class="step-hex">131817</div></div>
</div>
</div></body></html>
