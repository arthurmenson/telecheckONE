<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Telecheck — Patient Mock v7 · PRD-aligned</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Manrope:wght@400;500;600;700&family=Source+Serif+4:opsz,ital,wght@8..60,0,400;8..60,0,500;8..60,1,400;8..60,1,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="colors_and_type.css"/>
<link rel="stylesheet" href="Patient interactive mock v7.css"/>
<link rel="stylesheet" href="telecheck-minimal.css"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="Patient interactive mock.jsx"></script>
<script type="text/babel" src="Patient interactive mock - screens 1.jsx"></script>
<script type="text/babel" src="Patient interactive mock - screens 2.jsx"></script>
<script type="text/babel" src="Patient interactive mock v7.jsx"></script>
<script type="text/babel" src="Patient interactive mock v7 - care_detail.jsx"></script>
<script type="text/babel" src="Patient interactive mock v7 - devices.jsx"></script>
<script type="text/babel" src="Patient interactive mock v7 - home_care.jsx"></script>
<script type="text/babel" src="Patient interactive mock v7 - pharmacy_programs.jsx"></script>
<script type="text/babel" src="Patient interactive mock v7 - labs_me_detail.jsx"></script>
<script type="text/babel" src="Patient interactive mock v7 - pharmacy_labs_me.jsx"></script>
<script type="text/babel" src="Patient interactive mock v7 - consent_audit.jsx"></script>
<script type="text/babel" src="Patient interactive mock v7 - flows.jsx"></script>
<script type="text/babel" src="Patient interactive mock v7 - care_redesign.jsx"></script>
<script type="text/babel" src="Patient interactive mock v7 - pharmacy_redesign.jsx"></script>
<script type="text/babel" src="Patient interactive mock v7 - labs_redesign.jsx"></script>
<script type="text/babel" src="Patient interactive mock v7 - labs_me_extras.jsx"></script>
<script type="text/babel" src="Patient interactive mock v7 - me_redesign.jsx"></script>
<script type="text/babel" src="Patient interactive mock v7 - ai_redesign.jsx"></script>
<script type="text/babel" src="Patient interactive mock v7 - wiring.jsx"></script>

<!-- PRD v1.9 alignment layer · loads LAST so its globals are available everywhere -->
<script type="text/babel" src="Patient interactive mock v7 - prd_alignment.jsx"></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect } = React;

const TWEAKS = /*EDITMODE-BEGIN*/{
  "language": "English",
  "delegate": "me",
  "emergency_strip": false,
  "protocol_refills_active": false,
  "tenant": "telecheck-ghana",
  "show_prd_overlay": true,
  "show_tweaks": false
}/*EDITMODE-END*/;

function AppV2() {
  const [screen, setScreen] = useState(() => localStorage.getItem("pt-v7-screen") || "home");
  const [careSub, setCareSub] = useState("Hub");
  const [phSub, setPhSub] = useState("Hub");
  const [labSub, setLabSub] = useState("Hub");
  const [meSub, setMeSub] = useState("Hub");
  const [sheet, setSheet] = useState(null);
  const [fabOpen, setFabOpen] = useState(false);
  const [toasts, setToasts] = useState([]);
  const [tweaks, setTweaks] = useState(TWEAKS);
  const [editMode, setEditMode] = useState(TWEAKS.show_tweaks);
  const [enrolledPrograms, setEnrolledPrograms] = useState(() => {
    try { return JSON.parse(localStorage.getItem("pt-v2-programs") || "[]"); } catch { return []; }
  });
  const [careTrackSub, setCareTrackSub] = useState("Today");
  const [episodeActive, setEpisodeActive] = useState(false);
  const [delegateSwitcherOpen, setDelegateSwitcherOpen] = useState(false);

  useEffect(() => {
    window.__telecheck_openEpisodeConsent = () => setSheet("episode-consent");
    window.__telecheck_openEpisodeActive = () => setSheet("episode-active");
    // Open any PRD sheet from anywhere in the app
    window.__tcSheet = (k) => setSheet(k);
    return () => {
      delete window.__telecheck_openEpisodeConsent;
      delete window.__telecheck_openEpisodeActive;
      delete window.__tcSheet;
    };
  }, []);
  const enrollProgram = (id) => {
    setEnrolledPrograms(p => {
      const next = p.includes(id) ? p : [...p, id];
      localStorage.setItem("pt-v2-programs", JSON.stringify(next));
      return next;
    });
  };

  useEffect(() => { localStorage.setItem("pt-v7-screen", screen); }, [screen]);

  useEffect(() => {
    const onMsg = (e) => {
      if (e.data?.type === "__activate_edit_mode") setEditMode(true);
      if (e.data?.type === "__deactivate_edit_mode") setEditMode(false);
    };
    window.addEventListener("message", onMsg);
    window.parent.postMessage({ type: "__edit_mode_available" }, "*");
    return () => window.removeEventListener("message", onMsg);
  }, []);

  const setT = (k, v) => {
    const next = { ...tweaks, [k]: v };
    setTweaks(next);
    window.parent.postMessage({ type: "__edit_mode_set_keys", edits: { [k]: v } }, "*");
  };

  const nav = (s, origin) => {
    if (origin) window.__tcOrigin = origin;
    else if (screen === "home") window.__tcOrigin = "Home";
    else window.__tcOrigin = null;
    window.__tcNav = nav;
    if (s === "me-community") { setMeSub("Community"); setScreen("me"); return; }
    if (s === "me-family") { setMeSub("Profile"); setScreen("me"); return; }
    if (s === "me-records") { setMeSub("Records"); setScreen("me"); return; }
    if (s === "me-account") { setMeSub("Account"); setScreen("me"); return; }
    if (s === "me-prd") { setMeSub("PRD"); setScreen("me"); return; }
    if (s === "labs-upload") { setLabSub("Upload"); setScreen("labs"); return; }
    if (s === "labs-trends") { setLabSub("Trends"); setScreen("labs"); return; }
    if (s === "labs-results") { setLabSub("Hub"); setScreen("labs"); return; }
    if (s === "labs-ai") { setLabSub("Hub"); setScreen("labs"); return; }
    if (s === "pharmacy-shop") { setPhSub("Shop"); setScreen("pharmacy"); return; }
    if (s === "pharmacy-safety") { setPhSub("Safety"); setScreen("pharmacy"); return; }
    if (s === "pharmacy-programs") { setPhSub("Programs"); setScreen("pharmacy"); return; }
    if (s === "pharmacy-rx") { setPhSub("Rx"); setScreen("pharmacy"); return; }
    if (s === "pharmacy-orders") { setPhSub("Orders"); setScreen("pharmacy"); return; }
    if (s === "pharmacy-subs") { setPhSub("Subscriptions"); setScreen("pharmacy"); return; }
    if (s === "care-visits") { setCareSub("Visits"); setScreen("care"); return; }
    if (s === "care-track") { setCareSub("Track"); setScreen("care"); return; }
    if (s === "care-track-devices") { setCareSub("Track"); setCareTrackSub("Devices"); setScreen("care"); return; }
    if (s === "care-team") { setCareSub("Team"); setScreen("care"); return; }
    setScreen(s);
  };

  useEffect(() => { window.__tcNav = nav; }, [nav]);

  const toast = (t) => {
    const id = Date.now() + Math.random();
    setToasts(x => [...x, { id, t }]);
    setTimeout(() => setToasts(x => x.filter(y => y.id !== id)), 2400);
  };

  const openAccount = () => setSheet("account");
  const openNotifs = () => setSheet("notifs");
  // Crisis FLOOR-021 — wired to top-bar emergency button
  const openEmergency = () => setSheet("crisis");
  const openAI = () => setScreen("ai-ws");
  const openFAB = () => setFabOpen(true);

  const shared = { nav, toast, delegate: tweaks.delegate, openAccount, openNotifs, openEmergency, openAI,
    openEpisodeConsent: () => setSheet("episode-consent"),
    openEpisodeActive: () => setSheet("episode-active"),
    openDelegateSwitcher: () => setDelegateSwitcherOpen(true),
    episodeActive };

  const threadMatch = screen.startsWith("thread-") ? screen.slice(7) : null;

  const screens = {
    home:          <HomeV2 {...shared} openFAB={openFAB}/>,
    care:          <CareV2 {...shared} sub={careSub} setSub={setCareSub} trackSub={careTrackSub} setTrackSub={setCareTrackSub}/>,
    pharmacy:      <PharmacyV2 {...shared} sub={phSub} setSub={setPhSub} enrolledPrograms={enrolledPrograms} protocolRefillsActive={tweaks.protocol_refills_active}/>,
    "program-glp1":     <ProgramDetail nav={nav} toast={toast} programId="glp1" enrolled={enrolledPrograms.includes("glp1")} onEnroll={enrollProgram}/>,
    "program-baltasar": <ProgramDetail nav={nav} toast={toast} programId="baltasar" enrolled={enrolledPrograms.includes("baltasar")} onEnroll={enrollProgram}/>,
    "rx-metformin":   <PharmacyRxV2 nav={nav} toast={toast} rxId="metformin" protocolRefillsActive={tweaks.protocol_refills_active}/>,
    "rx-lisinopril":  <PharmacyRxV2 nav={nav} toast={toast} rxId="lisinopril"/>,
    "rx-paracetamol": <PharmacyRxV2 nav={nav} toast={toast} rxId="paracetamol"/>,
    "rx-new":         <PharmacyRxV2 nav={nav} toast={toast} rxId="new"/>,
    "device-accu-chek": <DeviceDetailScreen nav={nav} toast={toast} deviceId="accu-chek"/>,
    "device-omron-m2":  <DeviceDetailScreen nav={nav} toast={toast} deviceId="omron-m2"/>,
    labs:          <LabsV2 {...shared} sub={labSub} setSub={setLabSub}/>,
    me:            <MeV2 {...shared} sub={meSub} setSub={setMeSub}/>,
    "ai-ws":       <AIWorkspace nav={nav} toast={toast} goBack={() => setScreen("home")} delegate={tweaks.delegate}/>,
    "visit-prep":  <VisitPrep nav={nav} toast={toast}/>,
    video:         <VideoCall nav={nav} toast={toast}/>,
    "visit-summary": <VisitSummary nav={nav} toast={toast}/>,
    "doctor-search": <DoctorSearch nav={nav} toast={toast}/>,
    "pharmacy-rx":   <PharmacyRx nav={nav} toast={toast}/>,
    "scan-start":    <ScanStartV2 nav={nav}/>,
    "scan-result":   <ScanResultV2 nav={nav} toast={toast}/>,
    rpm:             <RPMCheckin nav={nav} toast={toast}/>,
    "data-use":      <DataUseScreen nav={nav} toast={toast}/>,
    jurisdiction:    <JurisdictionScreen nav={nav} toast={toast}/>,
    audit:           <AuditLogScreen nav={nav} toast={toast}/>,
    "prd-align":     <PrdAlignScreen {...shared} openFAB={openFAB}/>,
    glucose:      <Glucose nav={nav}/>,
    chat:         <Chat nav={nav} toast={toast}/>,
    meds:         <Meds nav={nav} toast={toast}/>,
  };

  return (
    <div className="page">
      <div className="hdr-title" style={{ display: "flex", alignItems: "center", gap: 10, justifyContent: "space-between" }}>
        <span>Telecheck — Patient app · v7 <span style={{ background: "#1e293b", color: "#fff", padding: "2px 8px", borderRadius: 6, fontSize: 11, fontWeight: 700, marginLeft: 6, letterSpacing: ".06em" }}>PRD v1.9</span></span>
        <span style={{ fontSize: 11, color: "#9aa5a0", fontWeight: 500 }}>Telecheck-Ghana 🇬🇭 · ADR-023 · ADR-024</span>
      </div>
      <div className="hdr-sub">PRD-aligned: subscription mechanics · multi-product cart · adverse events · audit chain · crisis floor · tenant context · save-and-resume intake. Same 5 bottom tabs.</div>

      <div className="device">
        <div className="island"/>
        <div className="screen">
          {tweaks.emergency_strip && screen !== "video" && (
            <div className="em-strip" style={{ position: "absolute", top: 50, left: 0, right: 0, zIndex: 70 }} onClick={openEmergency}>
              <div className="ic"><Ic2 n="sos" s={16} c="#fff"/></div>
              <div style={{ flex: 1 }}>Emergency · tap to call 112 or share location</div>
              <Ic2 n="chev" s={16} c="#fff"/>
            </div>
          )}

          {tweaks.delegate !== "me" && !["video","thread"].includes(screen) && !screen.startsWith("thread-") && (
            <DelegateBanner delegate={tweaks.delegate} onTap={() => setDelegateSwitcherOpen(true)}/>
          )}

          {threadMatch ? <ThreadScreen nav={nav} toast={toast} threadId={threadMatch}/> : (screens[screen] || screens.home)}

          {/* PRD persistent multi-product cart bar — appears whenever cart has items, on every screen except video */}
          {screen !== "video" && screen !== "ai-ws" && <CartBar onOpen={() => setSheet("cart")}/>}

          {fabOpen && <FabMenu onClose={() => setFabOpen(false)} nav={nav}/> }
          {sheet === "account" && <AccountSheetV2 onClose={() => setSheet(null)} delegate={tweaks.delegate} onPick={(d) => { setT("delegate", d); setSheet(null); toast(d === "k" ? "Switched to Kofi" : "Switched to Ama"); }}/>}
          {sheet === "notifs" && <NotifsSheet onClose={() => setSheet(null)} nav={nav}/>}
          {sheet === "emergency" && <EmergencySheet onClose={() => setSheet(null)} toast={toast}/>}
          {sheet === "episode-consent" && <EpisodeConsentSheet onClose={() => setSheet(null)} onGrant={() => setEpisodeActive(true)}/>}
          {sheet === "episode-active" && <EpisodeActiveSheet onClose={() => setSheet(null)} onRevoke={() => { setEpisodeActive(false); toast("Episode consent revoked · audited"); }} toast={toast}/>}

          {/* PRD sheets — accessible from anywhere via window.__tcSheet(...) */}
          {sheet === "crisis"      && <CrisisSheet onClose={() => setSheet(null)} toast={toast}/>}
          {sheet === "audit"       && <AuditSheet onClose={() => setSheet(null)}/>}
          {sheet === "ae"          && <AdverseEventSheet onClose={() => setSheet(null)} toast={toast}/>}
          {sheet === "fakemed"     && <FakeMedSheet onClose={() => setSheet(null)} toast={toast} nav={nav}/>}
          {sheet === "cart"        && <CartSheet onClose={() => setSheet(null)} toast={toast} nav={nav}/>}
          {sheet === "cancel-defl" && <CancelDeflectionSheet rx={window.__tcCancelRx || { name: "Metformin 500 mg" }} onClose={() => setSheet(null)} toast={toast} nav={nav}/>}
          {sheet === "pause"       && <SubActionSheet action="pause" onClose={() => setSheet(null)} toast={toast}/>}
          {sheet === "switch"      && <SubActionSheet action="switch" onClose={() => setSheet(null)} toast={toast}/>}
          {sheet === "skip"        && <SubActionSheet action="skip" onClose={() => setSheet(null)} toast={toast}/>}
          {sheet === "tenant"      && <TenantSheet onClose={() => setSheet(null)}/>}

          {delegateSwitcherOpen && (
            <DelegateSwitcherSheet
              current={tweaks.delegate}
              onClose={() => setDelegateSwitcherOpen(false)}
              onPick={(d) => {
                setT("delegate", d);
                setDelegateSwitcherOpen(false);
                toast(d === "me" ? "Now acting as yourself" : d === "k" ? "Switched to Kofi (dad)" : "Switched to Abena (daughter)");
              }}/>
          )}

          {toasts.map(t => <div key={t.id} className="toast">{t.t}</div>)}

          <div className="home-ind"/>
        </div>
      </div>

      <div className="hdr-sub" style={{ marginTop: 6, fontSize: 12 }}>
        <b style={{color:"#7dd3c0"}}>PRD jumps:</b>{" "}
        {[
          ["prd-align","Alignment map"],
          ["pharmacy-subs","Subscriptions"],
          ["pharmacy-shop","Multi-cart"],
          ["audit","Audit chain"],
        ].map(([k,l]) => (
          <span key={k} onClick={() => nav(k)} style={{ cursor: "pointer", color: screen === k ? "#7dd3c0" : "#cbd5e1", marginRight: 12, textDecoration: "underline", textUnderlineOffset: 3 }}>{l}</span>
        ))}
        <span onClick={() => setSheet("crisis")}  style={{cursor:"pointer", color:"#fca5a5", marginRight:12, textDecoration:"underline", textUnderlineOffset:3}}>Crisis</span>
        <span onClick={() => setSheet("ae")}      style={{cursor:"pointer", color:"#fcd34d", marginRight:12, textDecoration:"underline", textUnderlineOffset:3}}>Report side effect</span>
        <span onClick={() => setSheet("fakemed")} style={{cursor:"pointer", color:"#fcd34d", marginRight:12, textDecoration:"underline", textUnderlineOffset:3}}>Fake-med scan</span>
        <span onClick={() => setSheet("tenant")}  style={{cursor:"pointer", color:"#a5b4fc", marginRight:12, textDecoration:"underline", textUnderlineOffset:3}}>Tenant context</span>
      </div>

      <div className="hdr-sub" style={{ marginTop: 4, fontSize: 12 }}>
        Jump to: {["home","care","pharmacy","labs","me","ai-ws","visit-prep","video","visit-summary","doctor-search","pharmacy-rx","scan-start","scan-result","rpm","data-use","jurisdiction","audit"].map(k => (
          <span key={k} onClick={() => nav(k)} style={{ cursor: "pointer", color: screen === k ? "#7dd3c0" : "#9aa5a0", marginRight: 10, textDecoration: "underline", textUnderlineOffset: 3 }}>{k}</span>
        ))}
      </div>

      {editMode && (
        <div className="tweaks on">
          <h4>Tweaks</h4>
          <div className="tw-row"><span>Delegate</span>
            <div className="tw-opts">
              {[["me","Me (Ama)"],["k","Kofi (dad)"],["abena","Abena (8)"]].map(([v, l]) => (
                <button key={v} className={`tw-opt ${tweaks.delegate === v ? "on" : ""}`} onClick={() => setT("delegate", v)}>{l}</button>
              ))}
            </div>
          </div>
          <div className="tw-row"><span>Tenant (ADR-023)</span>
            <div className="tw-opts">
              {[["telecheck-ghana","Telecheck-Ghana 🇬🇭"],["heros-health","Heros Health 🇺🇸"]].map(([v,l]) => (
                <button key={v} className={`tw-opt ${tweaks.tenant === v ? "on" : ""}`} onClick={() => { setT("tenant", v); toast(v === "heros-health" ? "Tenant switched · US country profile loaded · payments via Stripe" : "Tenant switched · Ghana profile · Paystack + MoMo"); }}>{l}</button>
              ))}
            </div>
          </div>
          <div className="tw-row"><span>Emergency banner</span>
            <div className="tw-opts">
              <button className={`tw-opt ${!tweaks.emergency_strip ? "on" : ""}`} onClick={() => setT("emergency_strip", false)}>Off</button>
              <button className={`tw-opt ${tweaks.emergency_strip ? "on" : ""}`} onClick={() => setT("emergency_strip", true)}>On</button>
            </div>
          </div>
          <div className="tw-row"><span>Protocol-authorized refills</span>
            <div className="tw-opts">
              <button className={`tw-opt ${!tweaks.protocol_refills_active ? "on" : ""}`} onClick={() => setT("protocol_refills_active", false)}>Gated (day 1)</button>
              <button className={`tw-opt ${tweaks.protocol_refills_active ? "on" : ""}`} onClick={() => setT("protocol_refills_active", true)}>Activated</button>
            </div>
          </div>
          <div className="tw-row"><span>Language</span>
            <div className="tw-opts">
              {["English","Twi","Ga"].map(l => (
                <button key={l} className={`tw-opt ${tweaks.language === l ? "on" : ""}`} onClick={() => { setT("language", l); if (l !== "English") toast("Track A is English at launch · ADR-018"); }}>{l}</button>
              ))}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<AppV2/>);
</script>
</body>
</html>
