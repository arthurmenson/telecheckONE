<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Telecheck — Patient v4 (Print)</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Fraunces:ital,opsz,wght@0,9..144,300..500;1,9..144,300..500&display=swap"/>
<link rel="stylesheet" href="Patient interactive mock v4.css?v=1"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  body { background: #fff; margin: 0; padding: 0; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .page-hdr, .tweaks, .frame-label { display: none !important; }
  .print-sheet { display: flex; flex-direction: column; align-items: center; padding: 24px 0; page-break-after: always; break-after: page; }
  .print-sheet:last-child { page-break-after: auto; break-after: auto; }
  .print-sheet h2 { font-family: 'Fraunces', serif; font-size: 18px; font-weight: 400; margin: 0 0 12px; color: #0a0a0a; letter-spacing: -0.01em; }
  .print-sheet .phone { box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
  #root { display: flex; flex-direction: column; align-items: center; }
  @page { size: A4 portrait; margin: 0.5cm; }
  @media print {
    .print-sheet { padding: 0; }
    .print-sheet h2 { margin-bottom: 8px; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="Patient interactive mock v4.jsx"></script>
<script type="text/babel" src="Patient interactive mock v4 - screens.jsx"></script>
<script type="text/babel" src="Patient interactive mock v4 - pharmacy.jsx"></script>

<script type="text/babel" data-presets="react">
const noop = () => {};
const nav = noop, toast = noop;

const sheets = [
  ["Home",           <HomeV3 nav={nav} toast={toast}/>],
  ["Care",           <CareV3 nav={nav} toast={toast}/>],
  ["Labs",           <LabsV3 nav={nav} toast={toast}/>],
  ["Pharmacy",       <PharmacyV3 nav={nav} toast={toast}/>],
  ["AI",             <AIV3 nav={nav} toast={toast}/>],
  ["You",            <YouV3 nav={nav} toast={toast}/>],
  ["Visit",          <VisitV3 nav={nav} toast={toast}/>],
  ["Messages",       <MessagesV3 nav={nav} toast={toast}/>],
  ["Message thread", <ThreadV3 nav={nav} toast={toast}/>],
  ["Care team",      <TeamMemberV3 nav={nav} toast={toast}/>],
  ["Lab detail",     <LabDetailV3 nav={nav} toast={toast}/>],
  ["Rx detail",      <RxDetailV3 nav={nav} toast={toast}/>],
  ["Cart",           <CartV3 nav={nav} toast={toast}/>],
  ["Product",        <ProductV3 nav={nav} toast={toast}/>],
  ["Order detail",   <OrderDetailV3 nav={nav} toast={toast}/>],
  ["Profile",        <ProfileV3 nav={nav} toast={toast}/>],
  ["Medications",    <MedsListV3 nav={nav} toast={toast}/>],
  ["Delegates",      <DelegatesV3 nav={nav} toast={toast}/>],
  ["Notifications",  <NotifsV3 nav={nav} toast={toast}/>],
  ["Privacy",        <PrivacyV3 nav={nav} toast={toast}/>],
  ["Settings",       <SettingsV3 nav={nav} toast={toast}/>],
];

function PrintApp() {
  return (
    <>
      {sheets.map(([label, node], i) => (
        <div className="print-sheet" key={i}>
          <h2>{label}</h2>
          <div className="phone" data-theme="light">
            <div className="island"/>
            {node}
          </div>
        </div>
      ))}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<PrintApp/>);

// Auto-print after fonts + babel + delay
(async () => {
  try { await document.fonts.ready; } catch (e) {}
  await new Promise(r => setTimeout(r, 1200));
  window.print();
})();
</script>
</body>
</html>
