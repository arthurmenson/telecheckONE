<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Telecheck Command Center</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
<script src="docs-data.js"></script>
<style>
  :root{
    --bg:#0b0f17; --panel:#111826; --panel2:#0d1422; --border:#1f2a3d;
    --text:#e5e9f0; --muted:#8b95a7; --accent:#6aa9ff; --accent2:#9ee37d;
    --warn:#ffb454; --danger:#ff6b6b; --chip:#1a2438;
    --code:#0a1020;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--text);font:14px/1.5 ui-sans-serif,system-ui,-apple-system,Segoe UI,Inter,Roboto,sans-serif}
  a{color:var(--accent);text-decoration:none}
  a:hover{text-decoration:underline}
  .app{display:grid;grid-template-columns:340px 1fr;height:100vh;min-height:0}
  /* Sidebar */
  aside{background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;min-height:0}
  .brand{padding:14px 16px;border-bottom:1px solid var(--border)}
  .brand h1{margin:0;font-size:15px;letter-spacing:.3px}
  .brand .sub{color:var(--muted);font-size:12px;margin-top:2px}
  .search{padding:10px 12px;border-bottom:1px solid var(--border)}
  .search input{width:100%;background:var(--panel2);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:6px;outline:none}
  .search input:focus{border-color:var(--accent)}
  .tabs{display:flex;border-bottom:1px solid var(--border);background:var(--panel2)}
  .tabs button{flex:1;background:transparent;color:var(--muted);border:0;padding:10px;cursor:pointer;font-size:12px;border-bottom:2px solid transparent}
  .tabs button.active{color:var(--text);border-bottom-color:var(--accent)}
  .nav{overflow:auto;padding:6px 0;flex:1;min-height:0}
  .group{padding:6px 12px}
  .group h3{margin:10px 4px 4px;font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);display:flex;align-items:center;gap:8px}
  .group h3 .count{background:var(--chip);color:var(--muted);padding:1px 6px;border-radius:10px;font-size:10px}
  .group h3 .pill{background:#15324a;color:var(--accent);padding:1px 6px;border-radius:10px;font-size:10px}
  .group h3.danger .pill{background:#3a1818;color:var(--danger)}
  .item{display:block;padding:6px 8px;border-radius:5px;color:var(--text);font-size:12.5px;cursor:pointer;border:1px solid transparent}
  .item small{color:var(--muted);display:block;font-size:10.5px;margin-top:1px}
  .item:hover{background:var(--panel2);text-decoration:none}
  .item.active{background:#15233b;border-color:var(--accent)}
  .item .v{color:var(--accent2);font-size:10px;margin-left:6px}
  /* Main */
  main{display:flex;flex-direction:column;min-width:0;min-height:0}
  .topbar{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:var(--panel2);flex-wrap:wrap}
  .topbar .path{color:var(--muted);font-size:12px;font-family:ui-monospace,Menlo,monospace}
  .topbar .actions{margin-left:auto;display:flex;gap:8px}
  .btn{background:var(--chip);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:5px;cursor:pointer;font-size:12px}
  .btn:hover{border-color:var(--accent)}
  .content{overflow:auto;padding:24px 36px;flex:1;min-height:0}
  .content.home{padding:24px}
  /* Markdown */
  .md{max-width:920px}
  .md h1,.md h2,.md h3,.md h4{border-bottom:1px solid var(--border);padding-bottom:6px;margin-top:1.6em}
  .md h1{font-size:24px}
  .md h2{font-size:19px}
  .md h3{font-size:16px;border-bottom:0}
  .md code{background:var(--code);padding:1px 5px;border-radius:3px;font-size:12.5px}
  .md pre{background:var(--code);padding:12px;border-radius:6px;overflow:auto;border:1px solid var(--border)}
  .md pre code{background:transparent;padding:0}
  .md table{border-collapse:collapse;margin:12px 0;width:100%}
  .md th,.md td{border:1px solid var(--border);padding:6px 10px;text-align:left;font-size:13px}
  .md th{background:var(--panel2)}
  .md blockquote{border-left:3px solid var(--accent);margin:10px 0;padding:4px 12px;color:var(--muted);background:var(--panel2)}
  .md a{color:var(--accent)}
  /* Home */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;margin-top:14px}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:14px}
  .card h4{margin:0 0 6px;font-size:13px;display:flex;justify-content:space-between;align-items:center}
  .card p{margin:0;color:var(--muted);font-size:12px}
  .card .row{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
  .chip{background:var(--chip);border:1px solid var(--border);color:var(--text);padding:3px 8px;border-radius:12px;font-size:11px;cursor:pointer}
  .chip:hover{border-color:var(--accent)}
  .stat{display:flex;gap:18px;flex-wrap:wrap;margin-top:8px}
  .stat div{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:10px 14px;min-width:120px}
  .stat .n{font-size:20px;font-weight:600;color:var(--accent)}
  .stat .l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
  .banner{background:linear-gradient(135deg,#15233b,#1a3a3a);border:1px solid var(--border);border-radius:10px;padding:18px 20px;margin-bottom:8px}
  .banner h2{margin:0 0 6px;font-size:18px}
  .banner p{margin:0;color:var(--muted);font-size:13px}
  .skill{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px dashed var(--border)}
  .skill:last-child{border-bottom:0}
  .skill code{color:var(--accent2);font-size:11px;background:var(--code);padding:1px 5px;border-radius:3px;white-space:nowrap}
  .skill .d{font-size:12px;color:var(--muted)}
  details summary{cursor:pointer;color:var(--muted);font-size:12px;padding:6px 0}
  .hidden{display:none!important}
  .empty{color:var(--muted);padding:24px;text-align:center}
  .legend{font-size:11px;color:var(--muted);padding:8px 12px}
  .err{color:var(--danger);padding:14px}
  /* Cockpit */
  .cock-head{display:flex;flex-wrap:wrap;align-items:center;gap:12px;margin-bottom:14px}
  .cock-head h2{margin:0;font-size:18px}
  .cock-head .meta{color:var(--muted);font-size:12px}
  .cock-toolbar{margin-left:auto;display:flex;gap:8px;flex-wrap:wrap}
  .cock-toolbar select,.cock-toolbar input{background:var(--panel2);border:1px solid var(--border);color:var(--text);padding:6px 8px;border-radius:5px;font-size:12px;outline:none}
  .legend-row{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0 14px}
  .legend-pill{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);background:var(--panel);border:1px solid var(--border);padding:3px 8px;border-radius:11px}
  .legend-dot{width:8px;height:8px;border-radius:50%}
  .stats-strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:18px}
  .stat-card{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:10px 14px}
  .stat-card .n{font-size:20px;font-weight:600}
  .stat-card .l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
  .stat-card .bar{height:4px;background:var(--chip);border-radius:2px;margin-top:8px;overflow:hidden}
  .stat-card .bar > i{display:block;height:100%;background:var(--accent2)}
  .board{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px}
  .area{background:var(--panel);border:1px solid var(--border);border-left:3px solid var(--border);border-radius:8px;padding:12px 14px;display:flex;flex-direction:column;gap:8px;transition:border-color .15s}
  .area:hover{border-color:var(--accent)}
  .area .title{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
  .area .title h4{margin:0;font-size:13.5px;line-height:1.3}
  .area .cat{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
  .area .progress{height:6px;background:var(--chip);border-radius:3px;overflow:hidden}
  .area .progress > i{display:block;height:100%;background:var(--accent);transition:width .2s}
  .area .row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .area select.status,.area input.pct,.area input.owner{background:var(--panel2);border:1px solid var(--border);color:var(--text);padding:4px 6px;border-radius:4px;font-size:11px;outline:none}
  .area input.pct{width:54px;text-align:right}
  .area input.owner{flex:1;min-width:80px}
  .area textarea.notes{background:var(--panel2);border:1px solid var(--border);color:var(--text);padding:6px 8px;border-radius:4px;font-size:11.5px;outline:none;resize:vertical;min-height:36px;font-family:inherit}
  .area .docs{display:flex;flex-wrap:wrap;gap:4px}
  .area .docs a{font-size:10.5px;background:var(--chip);border:1px solid var(--border);padding:2px 6px;border-radius:4px;color:var(--text);cursor:pointer}
  .area .docs a:hover{border-color:var(--accent);text-decoration:none}
  .save-pill{display:inline-flex;align-items:center;gap:6px;color:var(--muted);font-size:11px}
  .save-pill.ok{color:var(--accent2)}
  .save-pill.err{color:var(--danger)}
  .group-divider{grid-column:1/-1;font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin:14px 0 -6px;padding-bottom:4px;border-bottom:1px solid var(--border)}
  /* In-flight live panel */
  .flight{background:linear-gradient(135deg,#15233b,#1a3a3a);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:14px}
  .flight .head{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .flight .head h3{margin:0;font-size:14px;display:flex;align-items:center;gap:8px}
  .flight .live-dot{width:8px;height:8px;border-radius:50%;background:var(--accent2);box-shadow:0 0 0 0 rgba(158,227,125,.7);animation:pulse 1.6s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(158,227,125,.5)}70%{box-shadow:0 0 0 7px rgba(158,227,125,0)}100%{box-shadow:0 0 0 0 rgba(158,227,125,0)}}
  .flight .last{margin-left:auto;font-size:11px;color:var(--muted)}
  .flight .grid2{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:8px}
  .flight .row-card{background:rgba(0,0,0,.18);border:1px solid var(--border);border-left:3px solid var(--warn);border-radius:6px;padding:8px 10px;cursor:pointer;transition:border-color .15s}
  .flight .row-card:hover{border-color:var(--accent)}
  .flight .row-card .n{font-size:12.5px;font-weight:600;display:flex;justify-content:space-between;gap:6px}
  .flight .row-card .n em{font-style:normal;color:var(--muted);font-weight:400;font-size:10.5px}
  .flight .row-card .meta{font-size:10.5px;color:var(--muted);display:flex;justify-content:space-between;margin-top:4px;gap:6px}
  .flight .row-card .bar{height:3px;background:var(--chip);border-radius:2px;margin-top:6px;overflow:hidden}
  .flight .row-card .bar > i{display:block;height:100%}
  .flight .empty{color:var(--muted);font-size:12px;font-style:italic;padding:6px 0}
  .flight .row-card.recent{box-shadow:0 0 0 2px rgba(158,227,125,.35)}
  /* Lifecycle stepper */
  .lifecycle{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:14px}
  .lifecycle .lc-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:8px}
  .lifecycle .lc-head h3{margin:0;font-size:14px}
  .lifecycle .lc-head .now{font-size:11px;color:var(--muted)}
  .lifecycle .lc-head .now b{color:var(--accent2)}
  .stepper{display:flex;align-items:flex-start;gap:0;overflow-x:auto;padding-bottom:6px}
  .step{flex:1 0 130px;min-width:130px;display:flex;flex-direction:column;align-items:center;position:relative;cursor:pointer;padding:0 4px}
  .step:not(:last-child)::after{content:"";position:absolute;top:19px;left:calc(50% + 22px);right:calc(-50% + 22px);height:2px;background:var(--border);z-index:0}
  .step.done:not(:last-child)::after{background:var(--accent2)}
  .step .ring{width:38px;height:38px;position:relative;z-index:1}
  .step .ring svg{width:100%;height:100%;transform:rotate(-90deg)}
  .step .ring .ring-bg{fill:none;stroke:var(--border);stroke-width:3}
  .step .ring .ring-fg{fill:none;stroke:var(--accent2);stroke-width:3;stroke-linecap:round;transition:stroke-dashoffset .35s ease}
  .step .ring .ring-label{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:10.5px;font-weight:600;color:var(--muted)}
  .step.done .ring .ring-label{color:var(--accent2)}
  .step.active .ring .ring-fg{stroke:var(--accent)}
  .step.active .ring .ring-label{color:var(--accent)}
  .step.active .ring{box-shadow:0 0 0 4px rgba(106,169,255,.15);border-radius:50%;animation:pulse-step 1.8s infinite}
  @keyframes pulse-step{0%{box-shadow:0 0 0 0 rgba(106,169,255,.4)}70%{box-shadow:0 0 0 9px rgba(106,169,255,0)}100%{box-shadow:0 0 0 0 rgba(106,169,255,0)}}
  .step .lbl{margin-top:6px;font-size:11.5px;color:var(--muted);text-align:center;line-height:1.25}
  .step.done .lbl{color:var(--text)}
  .step.active .lbl{color:var(--accent);font-weight:600}
  .step:hover .lbl{color:var(--text)}
  .lc-detail{margin-top:10px;padding:10px 12px;background:var(--panel2);border:1px solid var(--border);border-radius:6px;font-size:12.5px}
  .lc-detail .d-label{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px}
  .lc-detail .d-exit{margin-top:6px;color:var(--muted);font-size:11.5px;font-style:italic}
  .lc-edit{display:flex;gap:6px;margin-top:8px}
  .lc-edit select{background:var(--chip);border:1px solid var(--border);color:var(--text);border-radius:5px;padding:5px 8px;font-size:12px;flex:1}
  .lc-edit button{background:var(--accent);border:0;color:#0b0f17;border-radius:5px;padding:5px 12px;font-size:12px;font-weight:600;cursor:pointer}
  .lc-edit button:disabled{opacity:.5;cursor:not-allowed}
</style>
</head>
<body>
<div class="app">
  <aside>
    <div class="brand">
      <h1>Telecheck Command Center</h1>
      <div class="sub">FINAL US REGION BASELINE · 75 docs</div>
    </div>
    <div class="search"><input id="q" placeholder="Search docs (title, version, topic)…" /></div>
    <div class="tabs">
      <button class="active" data-tab="docs">Documents</button>
      <button data-tab="cockpit">Cockpit</button>
      <button data-tab="skills">Skills</button>
      <button data-tab="map">Hierarchy</button>
    </div>
    <div class="nav" id="nav-docs"></div>
    <div class="nav hidden" id="nav-cockpit"></div>
    <div class="nav hidden" id="nav-skills"></div>
    <div class="nav hidden" id="nav-map"></div>
    <div class="legend">Click any doc to view. Conflicts: top of hierarchy wins.</div>
  </aside>
  <main>
    <div class="topbar">
      <span id="crumb" class="path">Home</span>
      <div class="actions">
        <select class="btn" id="src-select" title="Document source"></select>
        <button class="btn" id="btn-home">Home</button>
        <button class="btn" id="btn-raw">Open on GitHub</button>
        <button class="btn" id="btn-print">Print</button>
      </div>
    </div>
    <div class="content home" id="content"></div>
  </main>
</div>

<script>
const BUNDLE = "Telecheck Master Bundle FINAL US REGION BASELINE";
const GH_OWNER = "arthurmenson";
const GH_REPO  = "telecheckONE";
const GH_BRANCH_DEFAULT = "main";
// "github" | "local"  — and which branch when github
const SOURCES = {
  github_main:   { kind:"github", branch:"main",   label:"GitHub · main" },
  github_branch: { kind:"github", branch:"claude/charming-poincare-854339", label:"GitHub · claude/charming-poincare-854339" },
  local:         { kind:"local",                    label:"Local files"  },
};
// Default to local files so edits to the spec bundle show up live.
let SOURCE_KEY = localStorage.getItem("tc.source") || "local";
SOURCES.embedded = { kind:"embedded", label:"Embedded (bundled snapshot)" };

// Doc registry: grouped per CLAUDE.md source-of-truth hierarchy.
// Each entry: [filename, label, optional version]
const GROUPS = [
  { id:"boot", title:"Boot Sequence (read first)", priority:0, items:[
    ["CLAUDE_CODE_BOOT_SEQUENCE.md","Claude Code Boot Sequence"],
    ["Telecheck_Active_Document_Index_v1_0.md","Active Document Index","v1.0"],
    ["Telecheck_Artifact_Registry_v2_9.md","Artifact Registry","v2.9"],
    ["Telecheck_Project_Upload_Manifest_v2.md","Upload Manifest","v2"],

    ["Telecheck_Reviewer_Brief_v1_0.md","Reviewer Brief","v1.0"],
  ]},
  { id:"invariants", title:"Platform Invariants (floor)", priority:1, items:[

    ["Telecheck_Contracts_Pack_v5_00_SOURCE_OF_TRUTH.md","Source of Truth","v5.1"],
  ]},
  { id:"adr", title:"Architecture Decisions (ADR)", priority:2, items:[
    ["Telecheck_ADR_Set_v1_0.md","ADR Set","v1.0"],
    ["Telecheck_ADR_Addendum_016_to_019.md","ADR Addendum 016–019"],
    ["Telecheck_ADR_Addendum_020_to_025.md","ADR Addendum 020–025"],
    ["Telecheck_ADR_Addendum_026.md","ADR Addendum 026 (us-east-1 / us-west-2)"],

  { id:"contracts", title:"Cross-cutting Contracts (v5.1)", priority:3, items:[

    ["Telecheck_Contracts_Pack_v5_Update_Spec.md","Contracts Pack Update Spec"],
    ["Telecheck_Contracts_Pack_v5_00_AUDIT_EVENTS.md","Audit Events"],

    ["Telecheck_Contracts_Pack_v5_00_ERROR_MODEL.md","Error Model"],

    ["Telecheck_Contracts_Pack_v5_00_CCR_RUNTIME.md","Country-driven Config Runtime"],

    ["Telecheck_Contracts_Pack_v5_00_TYPES.md","Types"],
  ]},
  { id:"master", title:"Master Platform PRD", priority:4, items:[
    ["Telecheck_Master_Platform_PRD_v1_9.md","Master Platform PRD","v1.9"],
  ]},
  { id:"slices", title:"Slice PRDs (17)", priority:5, items:[
    ["Telecheck_AI_Clinical_Assistant_Slice_PRD_v1_0.md","AI Clinical Assistant","v1.0"],
    ["Telecheck_Acquisition_Engagement_Tools_Slice_PRD_v1_0.md","Acquisition & Engagement","v1.0"],
    ["Telecheck_Admin_Backend_Slice_PRD_v1_1.md","Admin Backend","v1.1"],
    ["Telecheck_Admin_Configuration_Surfaces_Slice_PRD_v1_0.md","Admin Configuration Surfaces","v1.0"],
    ["Telecheck_Adverse_Event_Reporting_Slice_PRD_v1_0.md","Adverse Event Reporting","v1.0"],
    ["Telecheck_Async_Consult_Slice_PRD_v1_0.md","Async Consult","v1.0"],
    ["Telecheck_Community_Platform_Slice_PRD_v1_0.md","Community Platform","v1.0"],
    ["Telecheck_Consent_Delegated_Access_Slice_PRD_v1_0.md","Consent & Delegated Access","v1.0"],
    ["Telecheck_Fake_Medication_Detection_Slice_PRD_v1_0.md","Fake Medication Detection","v1.0"],
    ["Telecheck_Forms_Intake_Engine_Slice_PRD_v2_1.md","Forms / Intake Engine","v2.1"],
    ["Telecheck_Herb_Drug_Interaction_Engine_Slice_PRD_v1_0.md","Herb–Drug Interaction Engine","v1.0"],
    ["Telecheck_Labs_Document_Interpretation_Slice_PRD_v1_0.md","Labs & Document Interpretation","v1.0"],
    ["Telecheck_Market_Rollout_Cockpit_Slice_PRD_v1_0.md","Market Rollout Cockpit","v1.0"],
    ["Telecheck_Medication_Interaction_Engine_Slice_PRD_v1_0.md","Medication Interaction Engine","v1.0"],
    ["Telecheck_Pharmacy_Refill_Slice_PRD_v2_1.md","Pharmacy + Refill","v2.1"],
    ["Telecheck_RPM_CCM_Slice_PRD_v1_0.md","RPM / CCM","v1.0"],
    ["Telecheck_Sync_Video_Consult_Slice_PRD_v1_0.md","Sync Video Consult","v1.0"],
    ["Telecheck_Tenant_Threading_Addendum_v1_0.md","Tenant Threading Addendum","v1.0"],
  ]},
  { id:"eng", title:"Engineering Specs", priority:6, items:[
    ["Telecheck_Canonical_Data_Model_v1_2.md","Canonical Data Model","v1.2"],
    ["Telecheck_State_Machines_v1_1.md","State Machines","v1.1"],

// HTML-escape any user-controlled string before innerHTML interpolation.
function esc(s){
  return String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}
// Hex-color allowlist; falls back to neutral grey on bad input so user-controlled
// state colors can't smuggle CSS expressions through inline style attributes.
function safeColor(c){
  return (typeof c === "string" && /^#[0-9a-fA-F]{6}$/.test(c)) ? c : "#888888";
}

async function loadProgress(){
  try{
    const r = await fetch("/api/progress",{cache:"no-cache"});
    if(!r.ok) throw new Error(r.status+" "+r.statusText);
    PROGRESS = await r.json();
  }catch(e){
    // fallback: try the static file (works without server)
    try{
      const r2 = await fetch("progress.json",{cache:"no-cache"});
      PROGRESS = await r2.json();
      PROGRESS._readonly = true;
    }catch(e2){ PROGRESS = null; }
  }
}

function statusMap(){
  const m = {};
  (PROGRESS?.states||[]).forEach(s => m[s.id] = s);
  return m;
}

async function putProgress(doc, attempt){
  const ifMatch = `"r${doc.revision || 0}"`;
  const r = await fetch("/api/progress",{
    method:"PUT",
    headers:{"Content-Type":"application/json","If-Match":ifMatch},
    body: JSON.stringify(doc),
  });
  if(r.status === 409){
    // Server has a newer revision. Refetch + replay our local-only fields onto
    // the server's version, bump revision, retry once. If our edit still
    // collides with someone else's edit on the same field, server's value wins
    // and we surface a soft conflict notice.
    const conflict = await r.json();
    const server = conflict.current;
    if(attempt && attempt >= 1){ throw Object.assign(new Error("conflict"), {conflict:true}); }
    const merged = mergeForRetry(server, doc);
    return putProgress(merged, (attempt||0)+1);
  }
  if(!r.ok){
    let msg = r.status+" "+r.statusText;
    try { msg = (await r.text()).slice(0,200) || msg; } catch {}
    throw new Error(msg);
  }
  return r.json();
}

// Replay only fields the local client touched onto the server's latest doc.
// "Touched" = anything that differs between PROGRESS (last good baseline) and doc.
function mergeForRetry(server, mine){
  const out = JSON.parse(JSON.stringify(server));
  // Lifecycle.current
  if(mine.lifecycle?.current && mine.lifecycle.current !== server.lifecycle?.current){
    out.lifecycle = out.lifecycle || {}; out.lifecycle.current = mine.lifecycle.current;
  }
  // Per-area shallow merge of tracked fields where mine differs from server.
  const sMap = new Map((server.areas||[]).map(a=>[a.id,a]));
  out.areas = (mine.areas||[]).map(myArea=>{
    const sv = sMap.get(myArea.id) || myArea;
    const merged = {...sv};
    for(const k of ["status","progress","owner","notes","stage","docs"]){
      if(JSON.stringify(myArea[k]) !== JSON.stringify(sv[k])) merged[k] = myArea[k];
    }
    return merged;
  });
  return out;
}

function persistProgress(){
  if(!PROGRESS || PROGRESS._readonly) return;
  saveStatus = "saving"; renderSaveStatus();
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async ()=>{
    try{
      const j = await putProgress(PROGRESS);
      PROGRESS.revision = j.revision;
      PROGRESS.updated  = j.updated;
      PROGRESS.updatedAt = j.updatedAt;
      saveStatus = "ok"; renderSaveStatus();
      const meta = $("#cock-meta"); if(meta) meta.textContent = metaText();
    }catch(e){
      saveStatus = "err"; renderSaveStatus();
      if(e.conflict){
        const meta = $("#cock-meta"); if(meta) meta.textContent = "Conflict — refresh to see latest";
      }
    }
  }, 350);
}

function renderSaveStatus(){
  const el = $("#save-pill"); if(!el) return;
  el.className = "save-pill " + (saveStatus==="ok"?"ok":saveStatus==="err"?"err":"");
  el.textContent = saveStatus==="saving" ? "Saving…" : saveStatus==="ok" ? "Saved" : saveStatus==="err" ? "Save failed" : "";
}

function metaText(){
  const ro = PROGRESS?._readonly ? " · read-only (no server)" : "";
  return `Last updated ${PROGRESS?.updated || "?"}${ro}`;
}

// Refresh every visible "X min ago" label without re-rendering the page.
// Tagging contract: any element rendered with a timestamp gets
// class="timeago" data-ts="<iso>". This walks them all and updates textContent.
function refreshTimeAgo(){
  document.querySelectorAll(".timeago").forEach(el => {
    el.textContent = timeAgo(el.dataset.ts || "");
  });
}

function timeAgo(iso){
  if(!iso) return "—";
  const d = new Date(iso); if(isNaN(d)) return "—";
  const s = Math.max(0, Math.floor((Date.now() - d.getTime())/1000));
  if(s < 30) return "just now";
  if(s < 60) return s+"s ago";
  if(s < 3600) return Math.floor(s/60)+"m ago";
  if(s < 86400) return Math.floor(s/3600)+"h ago";
  return Math.floor(s/86400)+"d ago";
}

const SPEC_STATES = new Set(["not-started","spec-draft","spec-final"]);
const STAGE_BY_CATEGORY = {
  "Slice PRD":        "slice-build",
  "Experience":       "slice-build",
  "Engineering Spec": "foundation-build",
  "Operations":       "pilot",
};
const STAGE_OVERRIDE = { "ops-readiness": "internal-alpha", "ops-ghana": "pilot" };
function destStageFor(area){
  return STAGE_OVERRIDE[area.id] || STAGE_BY_CATEGORY[area.category] || "slice-build";
}
// Returns the stage id implied by an area's status: spec-baseline while in spec-*,
// otherwise the area's build-time destination. Falls back to existing stage if any
// of those targets don't exist in lifecycle.stages[].
function autoStageFor(area){
  const stages = new Set((PROGRESS?.lifecycle?.stages||[]).map(s=>s.id));
  const target = SPEC_STATES.has(area.status) ? "spec-baseline" : destStageFor(area);
  return stages.has(target) ? target : (area.stage || target);
}

function stageStats(stageId){
  const areas = (PROGRESS?.areas || []).filter(a => a.stage === stageId);
  const count = areas.length;
  if (!count) return { count:0, done:0, avg:0, byStatus:{} };
  const sum = areas.reduce((a,x) => a + (x.progress||0), 0);
  const done = areas.filter(a => a.status === "shipped" || (a.progress||0) >= 100).length;
  const byStatus = {};
  for (const a of areas) byStatus[a.status] = (byStatus[a.status]||0) + 1;
  return { count, done, avg: sum/count, byStatus };
}

function renderLifecycle(targetId, opts){
  const el = document.getElementById(targetId); if(!el) return;
  const lc = PROGRESS?.lifecycle;
  if(!lc || !Array.isArray(lc.stages) || !lc.stages.length){
    el.innerHTML = `<div class="lc-head"><h3>Program lifecycle</h3></div><div style="color:var(--muted);font-size:12px">No lifecycle defined.</div>`;
    return;
  }
  const editable = !!opts?.editable && !PROGRESS?._readonly;
  const idx = Math.max(0, lc.stages.findIndex(s=>s.id===lc.current));
  const cur = lc.stages[idx];
  const pct = Math.round((idx / Math.max(1, lc.stages.length-1)) * 100);
  el.innerHTML = `
    <div class="lc-head">
      <h3>Program lifecycle</h3>
      <div class="now">Currently in <b>${cur?.label||"?"}</b> · stage ${idx+1} of ${lc.stages.length} · ${pct}% through program</div>
    </div>
    <div class="stepper">
      ${lc.stages.map((s,i)=>{
        const cls = i<idx ? "done" : (i===idx ? "active" : "upcoming");
        const stats = stageStats(s.id);
        const pctVal = stats.count ? stats.avg : (i<idx ? 100 : 0);
        const C = 2 * Math.PI * 16; // r=16
        const off = C * (1 - pctVal/100);
        const mark = i<idx && pctVal>=99 ? "✓" : (pctVal>0 ? Math.round(pctVal)+"%" : (i+1));
        const subtitle = stats.count ? `${stats.done}/${stats.count}` : "0/0";
        return `<div class="step ${cls}" data-i="${i}" data-id="${esc(s.id)}" title="${esc(s.description||"")} (${stats.done}/${stats.count} areas, avg ${Math.round(pctVal)}%)">
          <div class="ring">
            <svg viewBox="0 0 38 38">
              <circle class="ring-bg" cx="19" cy="19" r="16"/>
              <circle class="ring-fg" cx="19" cy="19" r="16" stroke-dasharray="${C.toFixed(2)}" stroke-dashoffset="${off.toFixed(2)}"/>
            </svg>
            <div class="ring-label">${esc(mark)}</div>
          </div>
          <div class="lbl">${esc(s.label)}<br><span style="color:var(--muted);font-size:10.5px;font-weight:400">${esc(subtitle)}</span></div>
        </div>`;
      }).join("")}
    </div>
    <div class="lc-detail">
      <div class="d-label">${esc(cur?.label||"Current stage")} <span style="color:var(--muted);text-transform:none;letter-spacing:0">· ${(()=>{const st=stageStats(cur?.id||"");return `${st.done}/${st.count} done · avg ${Math.round(st.avg)}%`;})()}</span></div>
      <div>${esc(cur?.description||"")}</div>
      ${(()=>{const st=stageStats(cur?.id||""); if(!st.count) return ""; const sm=statusMap(); return `<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:6px">${Object.entries(st.byStatus).map(([k,v])=>{const s=sm[k]||{label:k,color:"#888"};return `<span class="legend-pill"><span class="legend-dot" style="background:${safeColor(s.color)}"></span>${esc(s.label)}: ${v}</span>`;}).join("")}</div>`;})()}
      ${cur?.exit ? `<div class="d-exit">Exit criteria: ${esc(cur.exit)}</div>` : ""}
      ${editable ? `<div class="lc-edit">
        <select id="lc-select">${lc.stages.map((s,i)=>{const st=stageStats(s.id); return `<option value="${esc(s.id)}" ${i===idx?"selected":""}>${i+1}. ${esc(s.label)} — ${Math.round(st.avg)}%</option>`;}).join("")}</select>
        <button id="lc-set">Set current stage</button>
      </div>` : ""}
    </div>
  `;
  el.querySelectorAll(".step").forEach(st=>st.addEventListener("click",()=>{
    const id = st.dataset.id;
    const sel = document.getElementById("lc-select");
    if(sel) sel.value = id;
    const stg = lc.stages.find(s=>s.id===id);
    const detail = el.querySelector(".lc-detail");
    if(!stg || !detail) return;
    const stats = stageStats(id);
    const sm = statusMap();
    const breakdown = stats.count
      ? `<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:6px">${Object.entries(stats.byStatus).map(([k,v])=>{const s=sm[k]||{label:k,color:"#888"};return `<span class="legend-pill"><span class="legend-dot" style="background:${safeColor(s.color)}"></span>${esc(s.label)}: ${v}</span>`;}).join("")}</div>`
      : "";
    detail.innerHTML = `
      <div class="d-label">${esc(stg.label)}${id===lc.current?" (current)":""} <span style="color:var(--muted);text-transform:none;letter-spacing:0">· ${stats.done}/${stats.count} done · avg ${Math.round(stats.avg)}%</span></div>
      <div>${esc(stg.description||"")}</div>
      ${breakdown}
      ${stg.exit ? `<div class="d-exit">Exit criteria: ${esc(stg.exit)}</div>` : ""}
      ${editable ? `<div class="lc-edit">
        <select id="lc-select">${lc.stages.map((s2,i2)=>{const st2=stageStats(s2.id); return `<option value="${esc(s2.id)}" ${s2.id===id?"selected":""}>${i2+1}. ${esc(s2.label)} — ${Math.round(st2.avg)}%</option>`;}).join("")}</select>
        <button id="lc-set">Set current stage</button>

    if(editable) bindLcSetButton(el, opts, targetId);

  if(editable) bindLcSetButton(el, opts, targetId);
}

function bindLcSetButton(el, opts, targetId){
  el.querySelector("#lc-set")?.addEventListener("click", async ()=>{
    const id = el.querySelector("#lc-select").value;
    if(id === PROGRESS.lifecycle.current) return;
    const next = JSON.parse(JSON.stringify(PROGRESS));
    next.lifecycle.current = id;
    saveStatus = "saving"; setMeta("Saving lifecycle…");
    try{
      const j = await putProgress(next);
      PROGRESS = next;
      PROGRESS.revision = j.revision;
      PROGRESS.updatedAt = j.updatedAt;
      saveStatus = "idle"; setMeta(metaText());
      renderLifecycle(targetId, opts);
    }catch(e){
      saveStatus = "error";
      setMeta(e.conflict ? "Conflict — refresh to see latest" : ("Save failed: "+(e.message||"")));
    }
  });
}

// Live polling — refetch /api/progress every 5s; if updatedAt changed, re-render visible panels.
let LIVE_TIMER = null;
function startLivePoll(){
  if(LIVE_TIMER) return;
  LIVE_TIMER = setInterval(async ()=>{
    if(document.hidden) return;
    // Always refresh time-ago labels each tick so "X min ago" stays current
    // even when there are no data changes or saves in flight.
    refreshTimeAgo();
    if(saveStatus === "saving") return; // don't clobber an in-flight save
    const prevAt = PROGRESS?.updatedAt;
    try{
      const r = await fetch("/api/progress",{cache:"no-cache"});
      if(!r.ok) return;
      const next = await r.json();
      if(next.updatedAt && next.updatedAt !== prevAt){
        PROGRESS = next;
        // Re-render whatever panels are visible.
        if(content.classList.contains("home")) renderHome();
        else if(crumb.textContent === "Cockpit") { renderCockpitSidebar(); renderCockpit(); }
        // Time-ago refresh fires automatically via the next tick.
      }
    }catch{}
  }, 5000);
  // Repaint timestamps when the user switches back to the tab (catches up
  // on time elapsed while the poll loop was paused).
  document.addEventListener("visibilitychange", () => { if(!document.hidden) refreshTimeAgo(); });
}

function aggregateStats(areas, sm){
  const total = areas.length || 1;
  const byStatus = {};
  let totalPct = 0;
  for(const a of areas){
    byStatus[a.status] = (byStatus[a.status]||0)+1;
    totalPct += Number(a.progress)||0;
  }
  const avgPct = Math.round(totalPct / total);
  const shipped = byStatus["shipped"]||0;
  const inDev = (byStatus["in-dev"]||0) + (byStatus["in-review"]||0);
  const blocked = byStatus["blocked"]||0;
  return { byStatus, avgPct, shipped, inDev, blocked, total };
}

    document.getElementById("area-"+el.dataset.area)?.animate([{boxShadow:"0 0 0 2px var(--accent)"},{boxShadow:"0 0 0 0 transparent"}],{duration:1100});
  }));
  navCockpit.querySelectorAll(".filt-state").forEach(c=>c.addEventListener("change",applyCockpitFilter));
  navCockpit.querySelector("#filt-all").addEventListener("change",e=>{
    navCockpit.querySelectorAll(".filt-state").forEach(c=>c.checked = e.target.checked);
    applyCockpitFilter();
  });
}

function applyCockpitFilter(){
  const allowed = new Set(Array.from(navCockpit.querySelectorAll(".filt-state:checked")).map(c=>c.value));
  document.querySelectorAll(".area").forEach(el=>{
    el.classList.toggle("hidden", !allowed.has(el.dataset.status));
  });
  // hide empty group dividers
  document.querySelectorAll(".group-divider").forEach(d=>{
    let n = d.nextElementSibling, vis = 0;
    while(n && !n.classList.contains("group-divider")){ if(!n.classList.contains("hidden")) vis++; n = n.nextElementSibling; }
    d.classList.toggle("hidden", vis===0);
  });
}

      <div class="stat-card"><div class="n">${stats.avgPct}%</div><div class="l">Avg progress</div><div class="bar"><i style="width:${stats.avgPct}%"></i></div></div>
      <div class="stat-card"><div class="n" style="color:var(--accent2)">${stats.shipped}</div><div class="l">Shipped</div></div>

function renderArea(a, sm){
  const s = sm[a.status] || {color:"#888888",label:a.status};
  const c = safeColor(s.color);
  const ro = PROGRESS._readonly ? "disabled" : "";
  const pct = Math.max(0, Math.min(100, Number(a.progress)||0));
  const docs = (a.docs||[]).map(d=>{
    const label = (String(d).replace(/^Telecheck_?/,"").replace(/_v\d_\d.md$/,"").replace(/\.md$/,"").replace(/_/g," ")).slice(0,38);
    return `<a data-doc="${esc(d)}" title="${esc(d)}">${esc(label)}</a>`;
  }).join("");
  return `<div class="area" id="area-${esc(a.id)}" data-id="${esc(a.id)}" data-status="${esc(a.status)}" style="border-left-color:${c}">
    <div class="title">
      <div>
        <div class="cat">${esc(a.category)} · <span title="${esc(a.updatedAt||"")}"><span class="timeago" data-ts="${esc(a.updatedAt||"")}">${esc(timeAgo(a.updatedAt))}</span></span></div>
        <h4>${esc(a.name)}</h4>
      </div>
    </div>
    <div class="progress"><i style="width:${pct}%;background:${c}"></i></div>
    <div class="row">
      <select class="status" ${ro}>
        ${PROGRESS.states.map(st=>`<option value="${esc(st.id)}" ${st.id===a.status?"selected":""}>${esc(st.label)}</option>`).join("")}
      </select>
      <input class="pct" type="number" min="0" max="100" value="${pct}" ${ro} />%
      <input class="owner" placeholder="owner" value="${esc(a.owner||"")}" ${ro} />
    </div>
    <div class="row" style="margin-top:4px">
      <select class="stage" ${ro} title="Lifecycle stage this area rolls up to">
        <option value="">— stage —</option>
        ${(PROGRESS.lifecycle?.stages||[]).map(st=>`<option value="${esc(st.id)}" ${st.id===a.stage?"selected":""}>${esc(st.label)}</option>`).join("")}
      </select>
    </div>
    <textarea class="notes" placeholder="Notes…" ${ro}>${esc(a.notes||"")}</textarea>
    ${docs?`<div class="docs">${docs}</div>`:""}
  </div>`;
}

function bindCockpitHandlers(){
  document.querySelectorAll(".area").forEach(card=>{
    const id = card.dataset.id;
    const area = PROGRESS.areas.find(a=>a.id===id);
    card.querySelector(".status").addEventListener("change",e=>{
      area.status = e.target.value;
      const sm = statusMap();
      card.dataset.status = area.status;
      card.style.borderLeftColor = sm[area.status].color;
      card.querySelector(".progress > i").style.background = sm[area.status].color;
      // Auto-migrate stage when crossing the spec ↔ build boundary.
      const want = autoStageFor(area);
      if (want && want !== area.stage) {
        area.stage = want;
        const sel = card.querySelector(".stage");
        if (sel) sel.value = want;
        renderLifecycle("lc-cockpit",{editable:true});
      }
      persistProgress();
      renderCockpitSidebar();
    });
    card.querySelector(".pct").addEventListener("input",e=>{
      let v = Math.max(0, Math.min(100, parseInt(e.target.value||"0",10)));
      area.progress = v;
      card.querySelector(".progress > i").style.width = v+"%";
      persistProgress();
    });
    card.querySelector(".owner").addEventListener("input",e=>{ area.owner = e.target.value; persistProgress(); });
    card.querySelector(".notes").addEventListener("input",e=>{ area.notes = e.target.value; persistProgress(); });
    card.querySelector(".stage")?.addEventListener("change",e=>{
      area.stage = e.target.value || undefined;
      persistProgress();
      renderLifecycle("lc-cockpit",{editable:true});
    });
    card.querySelectorAll(".docs a").forEach(a=>a.addEventListener("click",()=>{
      switchTab("docs"); openDoc(a.dataset.doc, a.dataset.doc);
    }));
  });
  $("#cock-search").addEventListener("input",e=>{
    const q = e.target.value.trim().toLowerCase();
    document.querySelectorAll(".area").forEach(card=>{
      card.classList.toggle("hidden", q && !card.textContent.toLowerCase().includes(q));
    });
  });
  $("#cock-sort").addEventListener("change",e=>{
    const sm = statusMap();
    let arr = [...PROGRESS.areas];
    const v = e.target.value;
    if(v==="status") arr.sort((a,b)=>(PROGRESS.states.findIndex(s=>s.id===a.status))-(PROGRESS.states.findIndex(s=>s.id===b.status)));
    else if(v==="pct-desc") arr.sort((a,b)=>(b.progress||0)-(a.progress||0));
    else if(v==="pct-asc")  arr.sort((a,b)=>(a.progress||0)-(b.progress||0));
    else if(v==="name") arr.sort((a,b)=>a.name.localeCompare(b.name));
    if(v==="cat"){ renderCockpit(); applyCockpitFilter(); return; }
    const board = $("#board");
    board.innerHTML = arr.map(a=>renderArea(a,sm)).join("");
    bindCockpitHandlers();
    applyCockpitFilter();
  });
}

function docHref(file){
  const s = SOURCES[SOURCE_KEY];
  const path = encodeURI(BUNDLE + "/" + file);
  if(s.kind==="github") return `https://raw.githubusercontent.com/${GH_OWNER}/${GH_REPO}/${s.branch}/${path}`;
  return BUNDLE + "/" + file;
}

  if(s.kind==="github") return `https://github.com/${GH_OWNER}/${GH_REPO}/blob/${s.branch}/${path}`;
  return BUNDLE + "/" + file;
}

let currentFile = null;
async function openDoc(file,label){
  currentFile = file;
  crumb.textContent = `${BUNDLE} / ${file}`;
  content.classList.remove("home");
  content.innerHTML = `<div class="empty">Loading ${file}…</div>`;
  navDocs.querySelectorAll(".item").forEach(i=>i.classList.toggle("active", i.dataset.file===file));
  try{
    let md;
    if(SOURCES[SOURCE_KEY].kind === "embedded"){
      if(!window.DOCS) throw new Error("docs-data.js not loaded");
      md = window.DOCS[file];
      if(md == null) throw new Error("not found in embedded bundle");
    } else {
      const r = await fetch(docHref(file));
      if(!r.ok) throw new Error(r.status+" "+r.statusText);
      md = await r.text();
    }
    const rawHtml = marked.parse(md);
    const safeHtml = (window.DOMPurify ? DOMPurify.sanitize(rawHtml, {USE_PROFILES:{html:true}}) : rawHtml.replace(/<script[\s\S]*?<\/script>/gi,""));
    content.innerHTML = `<div class="md">${safeHtml}</div>`;
    content.scrollTop = 0;
  }catch(e){
    const s = SOURCES[SOURCE_KEY];
    let hint;
    if(s.kind==="embedded") hint = `Embedded load failed (${e.message}). Make sure <code>docs-data.js</code> sits next to <code>index.html</code>, then reload.`;
    else if(s.kind==="local") hint = `Local fetch failed. If you opened via <code>file://</code>, browsers block local fetches — switch Source to <b>Embedded</b>, or run <code>python -m http.server 8000</code>.`;
    else hint = `GitHub fetch failed (${e.message}). Repo may be private (raw.githubusercontent.com requires auth) — switch Source to <b>Embedded</b>.`;
    content.innerHTML = `<div class="err">Failed to load <code>${file}</code>.<br><br>${hint}</div>`;
  }
}

$("#q").addEventListener("input",e=>{

      const hit = !q || i.textContent.toLowerCase().includes(q) || i.dataset.file.toLowerCase().includes(q);
      i.classList.toggle("hidden",!hit);
      if(hit) visible++;
    });
    g.classList.toggle("hidden", visible===0);
  });
});

  navCockpit.classList.toggle("hidden", tab!=="cockpit");

}
