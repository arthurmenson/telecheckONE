<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=1440"/>
<title>Telecheck Ops Cockpit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="cockpit.css"/>
<style>
  /* App-level overrides for the chrome */
  body { background: var(--bg); }
  .app-stack { display: contents; }
  /* Subtle background grid in the page region */
  .page {
    background-image: linear-gradient(to right, var(--grid-line) 1px, transparent 1px),
                      linear-gradient(to bottom, var(--grid-line) 1px, transparent 1px);
    background-size: 32px 32px;
  }
  /* Variant switcher pills near page header */
  .variant-switch {
    display: inline-flex; gap: 2px; padding: 2px;
    background: var(--surface-2); border: 1px solid var(--border-subtle);
    border-radius: 8px;
  }
  .variant-switch span {
    font-size: 11px; padding: 4px 10px; border-radius: 6px;
    cursor: pointer; color: var(--fg-3); font-weight: 600;
  }
  .variant-switch span.active { background: var(--surface-1); color: var(--fg-1); box-shadow: var(--shadow-1); }

  /* Hidden until ready (avoid FOUC) */
  #root:empty::before {
    content: ''; position: fixed; inset: 0;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body class="theme-dark">

<div id="root"></div>

<!-- Tokens scaffolding (must be in scope before useTweaks is called) -->
<script type="text/babel" data-presets="env,react">
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "theme": "dark",
    "variant": "hybrid",
    "density": "comfortable",
    "ai_intensity": "medium",
    "project": "telecheck",
    "realtime": true,
    "showRibbon": true
  }/*EDITMODE-END*/;
  window.__TWEAK_DEFAULTS = TWEAK_DEFAULTS;
</script>

<!-- Dependencies (order matters) -->
<script type="text/babel" data-presets="env,react" src="tweaks-panel.jsx"></script>
<script type="text/babel" data-presets="env,react" src="ios-frame.jsx"></script>
<script type="text/babel" data-presets="env,react" src="cockpit-icons.jsx"></script>
<script type="text/babel" data-presets="env,react" src="cockpit-data.jsx"></script>
<script type="text/babel" data-presets="env,react" src="cockpit-shell.jsx"></script>
<script type="text/babel" data-presets="env,react" src="cockpit-screen-cockpit.jsx"></script>
<script type="text/babel" data-presets="env,react" src="cockpit-screens-2.jsx"></script>
<script type="text/babel" data-presets="env,react" src="cockpit-screens-3.jsx"></script>

<!-- Main app -->
<script type="text/babel" data-presets="env,react">
  const {
    Sidebar, Topbar, PulseRibbon, Drawer, Modal,
    CockpitScreen, AgentsScreen, WorkScreen, SpecScreen,
    InventoryScreen, EventLogScreen, ChatScreen, SettingsScreen, MobileScreen,
    useTweaks, TweaksPanel, TweakSection, TweakRadio, TweakToggle, TweakSelect,
    COCKPIT_DATA, CockpitIcons,
  } = window;
  const I = CockpitIcons;
  const { useState, useEffect, useMemo } = React;

  // ---- Variant switcher (used inside Cockpit screen) ----
  function VariantSwitch({ value, onChange }) {
    return (
      <span className="variant-switch">
        {['dense','hybrid','glance'].map(v => (
          <span key={v} className={value === v ? 'active' : ''} onClick={() => onChange(v)}>
            {v[0].toUpperCase() + v.slice(1)}
          </span>
        ))}
      </span>
    );
  }

  // ---- Cockpit wrapper that exposes the variant switcher ----
  function CockpitWithSwitch({ data, variant, onVariant, onNav }) {
    return (
      <CockpitScreen
        data={data}
        variant={variant}
        onNav={onNav}
        headerExtra={<VariantSwitch value={variant} onChange={onVariant}/>}
      />
    );
  }

  // ---- Clock ----
  function useNow() {
    const [now, setNow] = useState(() => new Date());
    useEffect(() => {
      const id = setInterval(() => setNow(new Date()), 1000);
      return () => clearInterval(id);
    }, []);
    return now;
  }

  // ---- Notifications popover ----
  function App() {
    const [t, setTweak] = useTweaks(window.__TWEAK_DEFAULTS);
    const [active, setActive] = useState('cockpit');
    const [addAgentOpen, setAddAgentOpen] = useState(false);
    const [searchOpen, setSearchOpen] = useState(false);
    const [project, setProject] = useState(t.project || 'telecheck');

    const now = useNow();
    const nowStr = now.toISOString().slice(11, 19);

    // theme application
    useEffect(() => {
      document.body.classList.remove('theme-dark','theme-light');
      document.body.classList.add(t.theme === 'light' ? 'theme-light' : 'theme-dark');
    }, [t.theme]);

    // density
    useEffect(() => {
      document.documentElement.style.setProperty('color-scheme', t.theme === 'light' ? 'light' : 'dark');
    }, [t.theme]);

    // Sidebar counts (live-ish)
    const counts = useMemo(() => ({
      cockpit:   null,
      agents:    { v: COCKPIT_DATA.AGENTS.length },
      work:      { v: COCKPIT_DATA.PRS.filter(p => p.status !== 'merged').length },
      spec:      { v: COCKPIT_DATA.PENDING_RATIFICATIONS.length, tone: 'warn' },
      inventory: { v: COCKPIT_DATA.INVENTORY.length },
      events:    { v: '24k' },
      chat:      null,
    }), []);

    // Project list + handlers
    const projects = COCKPIT_DATA.PROJECTS;

    // Cmd-K
    useEffect(() => {
      const fn = e => {
        if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); setSearchOpen(true); }
        if (e.key === 'Escape') setSearchOpen(false);
      };
      window.addEventListener('keydown', fn);
      return () => window.removeEventListener('keydown', fn);
    }, []);

    // Apply AI intensity by toggling CSS root class
    useEffect(() => {
      document.body.dataset.aiIntensity = t.ai_intensity;
    }, [t.ai_intensity]);

    // Active screen
    let screen = null;
    switch (active) {
      case 'cockpit':
        screen = <CockpitWithSwitch data={COCKPIT_DATA} variant={t.variant} onVariant={(v) => setTweak('variant', v)} onNav={setActive}/>;
        break;
      case 'agents':
        screen = <AgentsScreen data={COCKPIT_DATA} addOpen={addAgentOpen} setAddOpen={setAddAgentOpen}/>;
        break;
      case 'work':
        screen = <WorkScreen data={COCKPIT_DATA}/>;
        break;
      case 'spec':
        screen = <SpecScreen data={COCKPIT_DATA}/>;
        break;
      case 'inventory':
        screen = <InventoryScreen data={COCKPIT_DATA}/>;
        break;
      case 'events':
        screen = <EventLogScreen data={COCKPIT_DATA}/>;
        break;
      case 'chat':
        screen = <ChatScreen data={COCKPIT_DATA}/>;
        break;
      case 'mobile':
        screen = <MobileScreen data={COCKPIT_DATA}/>;
        break;
      case 'settings':
        screen = <SettingsScreen data={COCKPIT_DATA}/>;
        break;
      default:
        screen = <div className="page-inner">Unknown screen.</div>;
    }

    return (
      <div className="app" data-density={t.density === 'compact' ? 'compact' : undefined}>
        <Sidebar
          active={active}
          onNav={setActive}
          counts={counts}
          project={project}
          projects={projects}
          onProjectChange={(p) => { setProject(p); setTweak('project', p); }}
        />
        <div className="main">
          <Topbar
            now={nowStr}
            density={t.density}
            theme={t.theme}
            onTheme={(th) => setTweak('theme', th)}
            onOpenSearch={() => setSearchOpen(true)}
          />
          <div className="page">
            {t.showRibbon && active !== 'chat' && active !== 'mobile' && (
              <PulseRibbon data={COCKPIT_DATA.KEY_EVENTS_24H} aiData={COCKPIT_DATA.AI_EVENTS_24H} now={nowStr}/>
            )}
            {screen}
          </div>
        </div>

        {/* Search (Cmd-K) */}
        <Modal open={searchOpen} onClose={() => setSearchOpen(false)} title="Jump to…" width={560}>
          <div style={{ display:'flex', alignItems:'center', gap:8, background:'var(--surface-2)',
                        border:'1px solid var(--border-subtle)', borderRadius:6, padding:'8px 12px' }}>
            <I.search/>
            <input autoFocus placeholder="Type to filter…" style={{ background:'transparent', border:0, outline:'none', flex:1, fontSize:14, color:'var(--fg-1)' }}/>
          </div>
          <div className="card-title">Suggestions</div>
          <div style={{ display:'flex', flexDirection:'column', gap:2 }}>
            {[
              { i:'queue', t:'Ratifier queue · 4 items', act:() => { setActive('spec'); setSearchOpen(false); } },
              { i:'cockpit', t:'Open Cockpit', act:() => { setActive('cockpit'); setSearchOpen(false); } },
              { i:'agents', t:'Agents grid', act:() => { setActive('agents'); setSearchOpen(false); } },
              { i:'events', t:'Event log · today', act:() => { setActive('events'); setSearchOpen(false); } },
              { i:'chat', t:'Talk to orchestrator', act:() => { setActive('chat'); setSearchOpen(false); } },
            ].map((row, i) => {
              const Ic = I[row.i] || I.cockpit;
              return (
                <div key={i} className="row" style={{ padding:'8px 10px', borderRadius:6, cursor:'pointer', gap:10 }}
                     onMouseDown={row.act}
                     onMouseEnter={(e) => e.currentTarget.style.background='var(--surface-2)'}
                     onMouseLeave={(e) => e.currentTarget.style.background=''}>
                  <Ic/>
                  <span style={{ fontSize:13 }}>{row.t}</span>
                </div>
              );
            })}
          </div>
        </Modal>

        {/* Tweaks panel */}
        <TweaksPanel title="Tweaks">
          <TweakSection label="Cockpit variant" />
          <TweakRadio  label="Layout" value={t.variant}
                       options={['dense','hybrid','glance']}
                       onChange={(v) => setTweak('variant', v)} />

          <TweakSection label="Surface" />
          <TweakRadio  label="Theme" value={t.theme}
                       options={['dark','light']}
                       onChange={(v) => setTweak('theme', v)} />
          <TweakRadio  label="Density" value={t.density}
                       options={['comfortable','compact']}
                       onChange={(v) => setTweak('density', v)} />
          <TweakToggle label="Activity ribbon" value={t.showRibbon}
                       onChange={(v) => setTweak('showRibbon', v)} />

          <TweakSection label="AI / human" />
          <TweakRadio  label="Iris accent" value={t.ai_intensity}
                       options={['subtle','medium','loud']}
                       onChange={(v) => setTweak('ai_intensity', v)} />

          <TweakSection label="Project" />
          <TweakSelect label="Active" value={t.project}
                       options={projects.map(p => ({ label: p.name, value: p.id }))}
                       onChange={(v) => { setTweak('project', v); setProject(v); }} />
          <TweakToggle label="Realtime ticks" value={t.realtime}
                       onChange={(v) => setTweak('realtime', v)} />
        </TweaksPanel>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

</body>
</html>
